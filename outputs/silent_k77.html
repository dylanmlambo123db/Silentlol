<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Press+Start+2P&display=swap');

@font-face{
    font-family:'Minecraft';
    src:local('Minecraft Regular'), local('Minecraft');
    font-display:swap;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    cursor:none;
}

body{
    overflow:hidden;
    background:#050505;
    color:white;
    perspective:1000px;
}



#bg{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 30% 30%, rgba(0,120,255,.25), transparent 35%),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,.12), transparent 35%),
        radial-gradient(circle at top,#202020 0%,#050505 50%);
    animation:bgMove 12s infinite alternate ease-in-out;
    transform:scale(1.2);
}

@keyframes bgMove{
    from{
        transform:scale(1.2) translate(-5%, -5%);
    }
    to{
        transform:scale(1.2) translate(5%, 5%);
    }
}

#enter{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    height:100dvh;
    display:block;
    background:
        linear-gradient(90deg, rgba(0,0,0,.86), rgba(2,8,24,.48), rgba(0,0,0,.9)),
        radial-gradient(circle at 58% 45%, rgba(39,94,255,.34), transparent 34%),
        url("enter-theme.jpg") center / cover no-repeat;
    backdrop-filter:blur(10px);
    z-index:1000;
    overflow:hidden;
}

#enter::before,
#enter::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:180px;
    height:180px;
    border:1px solid rgba(90,145,255,.42);
    border-radius:50%;
    transform:translate(-50%, -50%) scale(.3);
    opacity:0;
    box-shadow:
        inset 0 0 26px rgba(73,126,255,.18),
        0 0 38px rgba(75,135,255,.24);
    animation:enterRipple 2.6s ease-out infinite;
}

#enter::after{
    animation-delay:1.3s;
}

.enter-center{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1002;
    pointer-events:none;
}


.main{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.card{
    width:min(420px, calc(100vw - 32px));
    padding:30px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    backdrop-filter:blur(15px);
    text-align:center;
    animation:fadeIn .8s ease;
    transform:
        rotateX(calc(var(--move-y, 0) * -6deg))
        rotateY(calc(var(--move-x, 0) * 8deg))
        translate3d(calc(var(--move-x, 0) * 18px), calc(var(--move-y, 0) * 14px), 0);
    transform-style:preserve-3d;
    will-change:transform;
}

.avatar-wrap{
    position:relative;
    width:120px;
    height:120px;
    margin:0 auto;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.25);
    box-shadow:
        inset 0 0 22px rgba(255,255,255,.18),
        0 0 26px rgba(114,211,255,.22);
    isolation:isolate;
}

.avatar{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 30%;
    transform:scale(1.08);
}

.entered .avatar{
    animation:liveWallpaper 7s ease-in-out infinite alternate;
}

.avatar-wrap::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:3;
    border-radius:50%;
    background:
        linear-gradient(135deg, rgba(255,255,255,.55), rgba(255,255,255,0) 36%),
        radial-gradient(circle at 28% 18%, rgba(255,255,255,.7), rgba(255,255,255,0) 26%);
    box-shadow:
    0 0 25px rgba(255,215,100,.8),
    0 0 70px rgba(255,220,120,.35);
    mix-blend-mode:screen;
    pointer-events:none;
}

.avatar-wrap::after{
    content:"";
    position:absolute;
    inset:0;
    z-index:4;
    border-radius:50%;
    background:
        linear-gradient(55deg, transparent 47%, rgba(255,255,255,.55) 48%, transparent 50%),
        linear-gradient(118deg, transparent 43%, rgba(255,255,255,.4) 44%, transparent 46%),
        linear-gradient(160deg, transparent 58%, rgba(255,255,255,.35) 59%, transparent 61%);
    opacity:.9;
    pointer-events:none;
}

.eye-glow{
    position:absolute;
    left:35px;
    top:35px;
    width:22px;
    height:10px;
    z-index:6;
    pointer-events:none;
    border-radius:50%;
    background:
        radial-gradient(circle at 45% 50%, rgba(255,255,255,1) 0 12%, rgba(74,219,255,.95) 22%, rgba(0,133,255,.58) 43%, rgba(0,133,255,0) 72%);
    filter:blur(.2px);
    box-shadow:
        0 0 7px rgba(120,232,255,.95),
        0 0 18px rgba(0,153,255,.9),
        0 0 34px rgba(0,103,255,.65);
    opacity:.96;
    transform:rotate(-9deg);
    animation:eyePulse 2.4s ease-in-out infinite;
}

.eye-glow::before{
    content:"";
    position:absolute;
    left:-28px;
    top:-26px;
    width:78px;
    height:62px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(0,178,255,.32), rgba(0,178,255,.12) 38%, rgba(0,178,255,0) 72%);
    filter:blur(8px);
}

.glass-shard{
    position:absolute;
    inset:0;
    z-index:5;
    border-radius:50%;
    background-image:url("gojo-satoru.jpg");
    background-size:120px 120px;
    background-position:center;
    opacity:0;
    pointer-events:none;
    filter:brightness(1.18) saturate(1.12);
}

.entered .glass-shard{
    animation:glassBreak .9s cubic-bezier(.16,.86,.34,1) forwards;
}

.shard-1{
    clip-path:polygon(0 0, 48% 0, 35% 43%, 0 35%);
    --shard-x:-42px;
    --shard-y:-36px;
    --shard-r:-35deg;
}

.shard-2{
    clip-path:polygon(48% 0, 100% 0, 70% 38%, 35% 43%);
    --shard-x:36px;
    --shard-y:-42px;
    --shard-r:28deg;
}

.shard-3{
    clip-path:polygon(0 35%, 35% 43%, 42% 72%, 0 100%);
    --shard-x:-48px;
    --shard-y:24px;
    --shard-r:42deg;
}

.shard-4{
    clip-path:polygon(35% 43%, 70% 38%, 64% 72%, 42% 72%);
    --shard-x:4px;
    --shard-y:54px;
    --shard-r:-18deg;
}

.shard-5{
    clip-path:polygon(70% 38%, 100% 0, 100% 100%, 64% 72%);
    --shard-x:52px;
    --shard-y:26px;
    --shard-r:-46deg;
}

.shard-6{

}

.stats{

<script>
let musicPlayer;

function enterSite(){
const flash = document.getElementById("flash");

flash.animate([
    {opacity:0},
    {opacity:1},
    {opacity:0}
],{
    duration:600,
    easing:"ease-out"
});
    const cross = document.getElementById("cross");

    cross.animate([
        {transform:"scale(1)", opacity:1},
        {transform:"scale(1.5)", opacity:0}
    ],{
        duration:700,
        easing:"ease-out",
        fill:"forwards"
    });

    document.body.classList.add("entered");
  
    const intro = document.getElementById("enter");

    

    setTimeout(()=>{
  
      intro.classList.add("fade-out");

        setTimeout(()=>{
            intro.style.display="none";
            document.getElementById("main").style.display="flex";
        },1200);
    },250);

     if(musicPlayer){

        musicPlayer.setVolume(0);
        musicPlayer.play();

        let volume = 0;

        const fade = setInterval(()=>{

            volume += 5;
            musicPlayer.setVolume(volume);

            if(volume >= 100){
                clearInterval(fade);
            }

        },100);

    }

} 

window.addEventListener("load", ()=>{
    musicPlayer=SC.Widget(document.getElementById("bgm"));

    musicPlayer.bind(SC.Widget.Events.FINISH, ()=>{
        musicPlayer.seekTo(0);
        musicPlayer.play();
    });
    const cursorGlow = document.getElementById("cursorGlow");

window.addEventListener("mousemove",(e)=>{
    cursorGlow.style.left = e.clientX - 40 + "px";
    cursorGlow.style.top = e.clientY - 40 + "px";
});

const cursor={
    x:0,
    y:0,
    targetX:0,
    targetY:0,
    screenX:window.innerWidth / 2,
    screenY:window.innerHeight / 2
};

window.addEventListener("mousemove", (event)=>{
    cursor.targetX=(event.clientX / window.innerWidth - .5) * 2;
    cursor.targetY=(event.clientY / window.innerHeight - .5) * 2;
    cursor.screenX=event.clientX;
    cursor.screenY=event.clientY;
});

window.addEventListener("touchmove", (event)=>{
    if(!event.touches.length) return;

    const touch=event.touches[0];
    cursor.targetX=(touch.clientX / window.innerWidth - .5) * 2;
    cursor.targetY=(touch.clientY / window.innerHeight - .5) * 2;
    cursor.screenX=touch.clientX;
    cursor.screenY=touch.clientY;
}, {passive:true});

function animateCursor(){
    cursor.x+=(cursor.targetX - cursor.x) * .08;
    cursor.y+=(cursor.targetY - cursor.y) * .08;

    document.documentElement.style.setProperty("--move-x", cursor.x.toFixed(3));
    document.documentElement.style.setProperty("--move-y", cursor.y.toFixed(3));
    document.getElementById("diamondCursor").style.transform=`translate3d(${cursor.screenX}px, ${cursor.screenY}px, 0) rotate(45deg)`;

    requestAnimationFrame(animateCursor);
}

animateCursor();

function dropSnowflake(){
    const snowflake=document.createElement("span");
    const size=8 + Math.random() * 10;
    const drift=(Math.random() - .5) * 70;

    snowflake.className="snowflake";
    snowflake.textContent="❄";
    snowflake.style.fontSize=`${size}px`;
    snowflake.style.setProperty("--snow-x", `${cursor.screenX - size / 2}px`);
    snowflake.style.setProperty("--snow-y", `${cursor.screenY + 14}px`);
    snowflake.style.setProperty("--snow-drift", `${drift}px`);

    document.body.appendChild(snowflake);
    snowflake.addEventListener("animationend", ()=>{
        snowflake.remove();
    });
}

setInterval(dropSnowflake, 85);
    });
