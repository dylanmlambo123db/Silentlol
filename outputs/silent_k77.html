<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>silent_k77</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Press+Start+2P&display=swap');


@font-face{
    font-family:'Minecraft';
    src:local('Minecraft Regular'), local('Minecraft');
    font-display:swap;
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    cursor:none;
}


body{
    overflow:hidden;
    background:#050505;
    color:white;
    perspective:1000px;
}


/* BACKGROUND */

#bg{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at 30% 30%,rgba(0,120,255,.25),transparent 35%),
    radial-gradient(circle at 70% 70%,rgba(255,255,255,.12),transparent 35%),
    radial-gradient(circle at top,#202020 0%,#050505 50%);

    animation:bgMove 12s infinite alternate ease-in-out;
    transform:scale(1.2);
}


@keyframes bgMove{

from{
    transform:scale(1.2) translate(-5%,-5%);
}

to{
    transform:scale(1.2) translate(5%,5%);
}

}



/* ENTER SCREEN */


#enter{

    position:fixed;
    inset:0;

    width:100vw;
    height:100vh;

    display:block;

    background:
    linear-gradient(
    90deg,
    rgba(0,0,0,.86),
    rgba(2,8,24,.48),
    rgba(0,0,0,.9)
    ),

    radial-gradient(
    circle at 58% 45%,
    rgba(39,94,255,.34),
    transparent 34%
    ),

    url("enter-theme.jpg") center/cover no-repeat;


    backdrop-filter:blur(10px);

    z-index:1000;

    overflow:hidden;

    transition:
    opacity 1.2s ease,
    filter 1.2s ease;

}



#enter.fade-out{

    opacity:0;
    filter:blur(20px);

}



.enter-center{

    position:fixed;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:1002;

}



#cross{

    width:180px;

    cursor:pointer;
    user-select:none;

    animation:pulseCross 3s infinite;

    filter:
    drop-shadow(0 0 12px white)
    drop-shadow(0 0 35px white);

}



#cross:hover{

transform:scale(1.05);

}



@keyframes pulseCross{

0%,100%{

transform:scale(1);

filter:
drop-shadow(0 0 12px white)
drop-shadow(0 0 35px white);

}


50%{

transform:scale(1.08);

filter:
drop-shadow(0 0 30px white)
drop-shadow(0 0 70px white);

}

}



/* MAIN CARD */


.main{

display:none;

height:100vh;

justify-content:center;
align-items:center;

}



.card{

width:min(420px,calc(100vw - 32px));

padding:30px;


background:rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);


border-radius:24px;


backdrop-filter:blur(15px);


text-align:center;


transform:

rotateX(calc(var(--move-y,0)*-6deg))

rotateY(calc(var(--move-x,0)*8deg))

translate3d(
calc(var(--move-x,0)*18px),
calc(var(--move-y,0)*14px),
0
);


transform-style:preserve-3d;


}


.entered .card{

animation:
fadeIn .8s ease,
cardFloat 6s infinite;

}



@keyframes fadeIn{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}



@keyframes cardFloat{

50%{

translate:0 -8px;

}

}



/* AVATAR */


.avatar-wrap{

position:relative;

width:120px;
height:120px;

margin:auto;

border-radius:50%;

overflow:hidden;


border:
3px solid rgba(255,255,255,.25);


box-shadow:

0 0 26px rgba(114,211,255,.22);


}



.avatar{

width:100%;
height:100%;

object-fit:cover;

object-position:center;

transform:scale(1.08);

}



.avatar-wrap::before{

content:"";

position:absolute;

inset:0;

z-index:3;

border-radius:50%;

background:

linear-gradient(
135deg,
rgba(255,255,255,.55),
transparent 36%
);


mix-blend-mode:screen;

}




.eye-glow{

position:absolute;

left:35px;
top:35px;


width:22px;
height:10px;


border-radius:50%;


background:

radial-gradient(
circle,
white,
#0099ff,
transparent
);


box-shadow:

0 0 15px #00aaff,
0 0 40px #0066ff;


animation:eyePulse 2.4s infinite;


}



@keyframes eyePulse{

50%{

transform:scale(1.15);

}

}
    .username{

    text-shadow:
    0 0 10px white,
    0 0 25px rgba(255,220,120,.8);


    width:0;
    max-width:max-content;

    margin:15px auto 0;

    overflow:hidden;

    border-right:3px solid rgba(255,255,255,.85);


    font-family:
    'Minecraft',
    'Press Start 2P',
    monospace;


    font-size:clamp(1.35rem,6vw,2.05rem);

    white-space:nowrap;


    animation:

    typeUsername 1.15s steps(10,end) .35s forwards,

    typeCaret .72s step-end infinite;

}



@keyframes typeUsername{

to{

width:10ch;

}

}



@keyframes typeCaret{

50%{

border-color:transparent;

}

}





/* BIO */


.bio{

margin-top:10px;

color:#bdbdbd;


font-family:
'Minecraft',
'Press Start 2P',
monospace;


font-size:.8rem;

line-height:1.8;

opacity:.85;

}





/* SOCIALS */


.socials{

margin-top:24px;

display:flex;

justify-content:center;

gap:14px;


}



.socials a{

position:relative;


width:46px;
height:46px;


display:grid;

place-items:center;


border:

1px solid rgba(255,255,255,.12);


border-radius:14px;


background:
rgba(255,255,255,.055);


color:white;


text-decoration:none;


transition:.25s;

}



.socials a:hover{

transform:

translateY(-3px)
scale(1.05);


background:

rgba(255,255,255,.15);

}



.socials i{

font-size:1.35rem;

}





/* TOOLTIP */


.socials a::after{

content:attr(aria-label);


position:absolute;


bottom:-35px;


padding:6px 10px;


background:#111;


border-radius:8px;


font-size:.7rem;


opacity:0;


pointer-events:none;


transition:.2s;

}



.socials a:hover::after{

opacity:1;

}




/* STATS */


.stats{

margin-top:20px;

color:#888;

font-size:.9rem;

}





/* MUSIC VISUALIZER */


.music-visualizer{

position:fixed;


bottom:35px;

left:50%;


transform:translateX(-50%);


display:flex;

gap:6px;


height:60px;


padding:15px 25px;


align-items:center;


border-radius:30px;


background:
rgba(255,255,255,.04);


backdrop-filter:blur(12px);


border:
1px solid rgba(255,255,255,.1);


}



.entered .bar{

width:5px;

height:15px;


background:

linear-gradient(
white,
#6dd5ff,
#0066ff
);


border-radius:10px;


box-shadow:

0 0 10px white,
0 0 25px #0099ff;


animation:

musicBars .8s infinite;

}



.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}
.bar:nth-child(6){animation-delay:.5s}
.bar:nth-child(7){animation-delay:.6s}
.bar:nth-child(8){animation-delay:.7s}
.bar:nth-child(9){animation-delay:.8s}
.bar:nth-child(10){animation-delay:.9s}
.bar:nth-child(11){animation-delay:1s}
.bar:nth-child(12){animation-delay:1.1s}
.bar:nth-child(13){animation-delay:1.2s}
.bar:nth-child(14){animation-delay:1.3s}
.bar:nth-child(15){animation-delay:1.4s}



@keyframes musicBars{

0%,100%{

height:12px;

}

50%{

height:45px;

}

}





/* CURSOR */


.diamond-cursor{

position:fixed;

width:18px;

height:18px;


z-index:999;


pointer-events:none;


border:2px solid white;


background:

linear-gradient(
135deg,
white,
#6dd5ff
);


transform:rotate(45deg);


box-shadow:

0 0 15px #00aaff;


}




.cursor-glow{

position:fixed;


width:80px;

height:80px;


border-radius:50%;


background:

rgba(100,200,255,.15);


filter:blur(25px);


pointer-events:none;

}




/* FLASH */


#flash{

position:fixed;

inset:0;


background:white;


opacity:0;


pointer-events:none;


z-index:2000;

}




@media(max-width:700px){

*{

cursor:auto;

}


.diamond-cursor,
.cursor-glow{

display:none;

}

}

Now after that CSS, close the style:

</style>
</head>

Then start your body with:

<body>

<div id="bg"></div>

<div class="diamond-cursor" id="diamondCursor"></div>

<div class="cursor-glow" id="cursorGlow"></div>

<div id="flash"></div>


<div id="enter">

<div class="enter-center">

<img 
id="cross"
src="cross.png"
onclick="enterSite()"
alt="enter">

</div>

</div>
<div class="main" id="main">

<div class="card">


<div class="avatar-wrap">

<img 
class="avatar"
src="gojo-satoru.jpg"
alt="silent_k77 avatar">


<span class="eye-glow"></span>


</div>



<div class="username">
silent_k77

<div class="bio">

gamer_<br>
creator_<br>

href="https://discord.com/"

welcome to my profile

</div>



</div>

</div>



<div class="music-visualizer">

</div>




<iframe

id="bgm"

width="0"

height="0"

allow="autoplay"

src="https://w.soundcloud.com/player/?url=https://soundcloud.com/user-883965206/maybe-for-you-theres-a&auto_play=false">

</iframe>




<script src="https://w.soundcloud.com/player/api.js"></script>



<script>


let musicPlayer;



function enterSite(){


const flash=document.getElementById("flash");


flash.animate(

[
{opacity:0},
{opacity:1},
{opacity:0}
],

{

duration:600

}

);



document.body.classList.add("entered");



const intro=document.getElementById("enter");



setTimeout(()=>{


intro.classList.add("fade-out");



setTimeout(()=>{


intro.style.display="none";


document.getElementById("main").style.display="flex";


},1200);



},250);



if(musicPlayer){


musicPlayer.play();


}


}




window.addEventListener("load",()=>{



const iframe=document.getElementById("bgm");


musicPlayer=SC.Widget(iframe);



});







/* CURSOR MOVEMENT */


const cursor=document.getElementById("diamondCursor");

const glow=document.getElementById("cursorGlow");



let mouseX=0;

let mouseY=0;



window.addEventListener("mousemove",(e)=>{


mouseX=e.clientX;

mouseY=e.clientY;



glow.style.left=

mouseX-40+"px";

glow.style.top=

mouseY-40+"px";


});




function moveCursor(){


cursor.style.left=

mouseX+"px";


cursor.style.top=

mouseY+"px";



requestAnimationFrame(moveCursor);


}


moveCursor();






/* 3D CARD MOVEMENT */


window.addEventListener("mousemove",(e)=>{


let x=e.clientX/window.innerWidth-.5;

let y=e.clientY/window.innerHeight-.5;



document.documentElement.style.setProperty(
"--move-x",
x
);



document.documentElement.style.setProperty(
"--move-y",
y
);



});






/* SNOW CURSOR PARTICLES */


function snow(){


const s=document.createElement("div");


s.textContent="❄";


s.style.position="fixed";

s.style.left=mouseX+"px";

s.style.top=mouseY+"px";


s.style.color="white";


s.style.pointerEvents="none";


s.style.fontSize=
Math.random()*12+8+"px";



document.body.appendChild(s);



s.animate(

[

{
transform:"translateY(0)",
opacity:1
},

{
transform:
`translate(${Math.random()*80-40}px,80px)`,
opacity:0

}

],

{

duration:900

}

).onfinish=()=>s.remove();



}



setInterval(snow,100);



</script>



</body>
