<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>silent_k77</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Press+Start+2P&display=swap');

@font-face{
    font-family:'Minecraft';
    src:local('Minecraft Regular'), local('Minecraft');
    font-display:swap;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    cursor:none;
}

body{
    overflow:hidden;
    background:#050505;
    color:white;
    perspective:1000px;
}

#bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#202020 0%,#050505 50%);
    transform:translate3d(calc(var(--move-x, 0) * -10px), calc(var(--move-y, 0) * -10px), 0) scale(1.04);
    transition:transform .12s linear;
}

#enter{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    height:100dvh;
    display:block;
    background:
        linear-gradient(90deg, rgba(0,0,0,.86), rgba(2,8,24,.48), rgba(0,0,0,.9)),
        radial-gradient(circle at 58% 45%, rgba(39,94,255,.34), transparent 34%),
        url("enter-theme.jpg") center / cover no-repeat;
    backdrop-filter:blur(10px);
    z-index:1000;
    overflow:hidden;
}

#enter::before,
#enter::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:180px;
    height:180px;
    border:1px solid rgba(90,145,255,.42);
    border-radius:50%;
    transform:translate(-50%, -50%) scale(.3);
    opacity:0;
    box-shadow:
        inset 0 0 26px rgba(73,126,255,.18),
        0 0 38px rgba(75,135,255,.24);
    animation:enterRipple 2.6s ease-out infinite;
}

#enter::after{
    animation-delay:1.3s;
}

.enter-center{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1002;
    pointer-events:none;
}

.enter-btn{
    position:static;
    display:block;
    min-width:180px;
    margin:auto;
    padding:19px 46px;
    border:1px solid rgba(139,176,255,.45);
    border-radius:16px;
    background:
        linear-gradient(145deg, rgba(255,255,255,.18), rgba(39,89,255,.12) 42%, rgba(0,0,0,.38)),
        rgba(3,11,31,.42);
    color:white;
    font-family:'Minecraft','Press Start 2P',monospace;
    font-size:.96rem;
    letter-spacing:0;
    cursor:pointer;
    text-shadow:
        0 0 8px rgba(129,190,255,.95),
        0 0 18px rgba(42,99,255,.8);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.28),
        inset 0 -18px 34px rgba(0,0,0,.24),
        0 0 22px rgba(68,122,255,.45),
        0 18px 55px rgba(0,0,0,.54);
    backdrop-filter:blur(18px) saturate(1.4);
    overflow:hidden;
    pointer-events:auto;
    transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease;
}

.enter-btn::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:
        linear-gradient(115deg, transparent 8%, rgba(255,255,255,.52) 18%, transparent 28%),
        linear-gradient(40deg, transparent 44%, rgba(95,154,255,.5) 45%, transparent 48%);
    transform:translateX(-130%);
    transition:transform .5s ease;
}

.enter-btn::after{
    content:"";
    position:absolute;
    inset:8px;
    border:1px solid rgba(255,255,255,.16);
    border-radius:11px;
    pointer-events:none;
}

.enter-btn:hover{
    transform:translateY(-3px) scale(1.04);
    border-color:rgba(191,215,255,.82);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.38),
        inset 0 -18px 34px rgba(0,0,0,.2),
        0 0 34px rgba(92,151,255,.78),
        0 24px 70px rgba(0,0,0,.6);
}

.enter-btn:hover::before{
    transform:translateX(120%);
}

.enter-btn span{
    position:relative;
    z-index:1;
}

.main{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.card{
    width:min(420px, calc(100vw - 32px));
    padding:30px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    backdrop-filter:blur(15px);
    text-align:center;
    animation:fadeIn .8s ease;
    transform:
        rotateX(calc(var(--move-y, 0) * -6deg))
        rotateY(calc(var(--move-x, 0) * 8deg))
        translate3d(calc(var(--move-x, 0) * 18px), calc(var(--move-y, 0) * 14px), 0);
    transform-style:preserve-3d;
    will-change:transform;
}

.avatar-wrap{
    position:relative;
    width:120px;
    height:120px;
    margin:0 auto;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.25);
    box-shadow:
        inset 0 0 22px rgba(255,255,255,.18),
        0 0 26px rgba(114,211,255,.22);
    isolation:isolate;
}

.avatar{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 30%;
    transform:scale(1.08);
}

.entered .avatar{
    animation:liveWallpaper 7s ease-in-out infinite alternate;
}

.avatar-wrap::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:3;
    border-radius:50%;
    background:
        linear-gradient(135deg, rgba(255,255,255,.55), rgba(255,255,255,0) 36%),
        radial-gradient(circle at 28% 18%, rgba(255,255,255,.7), rgba(255,255,255,0) 26%);
    mix-blend-mode:screen;
    pointer-events:none;
}

.avatar-wrap::after{
    content:"";
    position:absolute;
    inset:0;
    z-index:4;
    border-radius:50%;
    background:
        linear-gradient(55deg, transparent 47%, rgba(255,255,255,.55) 48%, transparent 50%),
        linear-gradient(118deg, transparent 43%, rgba(255,255,255,.4) 44%, transparent 46%),
        linear-gradient(160deg, transparent 58%, rgba(255,255,255,.35) 59%, transparent 61%);
    opacity:.9;
    pointer-events:none;
}

.eye-glow{
    position:absolute;
    left:35px;
    top:35px;
    width:22px;
    height:10px;
    z-index:6;
    pointer-events:none;
    border-radius:50%;
    background:
        radial-gradient(circle at 45% 50%, rgba(255,255,255,1) 0 12%, rgba(74,219,255,.95) 22%, rgba(0,133,255,.58) 43%, rgba(0,133,255,0) 72%);
    filter:blur(.2px);
    box-shadow:
        0 0 7px rgba(120,232,255,.95),
        0 0 18px rgba(0,153,255,.9),
        0 0 34px rgba(0,103,255,.65);
    opacity:.96;
    transform:rotate(-9deg);
    animation:eyePulse 2.4s ease-in-out infinite;
}

.eye-glow::before{
    content:"";
    position:absolute;
    left:-28px;
    top:-26px;
    width:78px;
    height:62px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(0,178,255,.32), rgba(0,178,255,.12) 38%, rgba(0,178,255,0) 72%);
    filter:blur(8px);
}

.glass-shard{
    position:absolute;
    inset:0;
    z-index:5;
    border-radius:50%;
    background-image:url("gojo-satoru.jpg");
    background-size:120px 120px;
    background-position:center;
    opacity:0;
    pointer-events:none;
    filter:brightness(1.18) saturate(1.12);
}

.entered .glass-shard{
    animation:glassBreak .9s cubic-bezier(.16,.86,.34,1) forwards;
}

.shard-1{
    clip-path:polygon(0 0, 48% 0, 35% 43%, 0 35%);
    --shard-x:-42px;
    --shard-y:-36px;
    --shard-r:-35deg;
}

.shard-2{
    clip-path:polygon(48% 0, 100% 0, 70% 38%, 35% 43%);
    --shard-x:36px;
    --shard-y:-42px;
    --shard-r:28deg;
}

.shard-3{
    clip-path:polygon(0 35%, 35% 43%, 42% 72%, 0 100%);
    --shard-x:-48px;
    --shard-y:24px;
    --shard-r:42deg;
}

.shard-4{
    clip-path:polygon(35% 43%, 70% 38%, 64% 72%, 42% 72%);
    --shard-x:4px;
    --shard-y:54px;
    --shard-r:-18deg;
}

.shard-5{
    clip-path:polygon(70% 38%, 100% 0, 100% 100%, 64% 72%);
    --shard-x:52px;
    --shard-y:26px;
    --shard-r:-46deg;
}

.shard-6{
    clip-path:polygon(0 100%, 42% 72%, 100% 100%);
    --shard-x:-5px;
    --shard-y:62px;
    --shard-r:26deg;
}

.username{
    width:0;
    max-width:max-content;
    margin:15px auto 0;
    overflow:hidden;
    border-right:3px solid rgba(255,255,255,.85);
    font-family:'Minecraft','Press Start 2P',monospace;
    font-size:clamp(1.35rem, 6vw, 2.05rem);
    font-weight:400;
    line-height:1.3;
    letter-spacing:0;
    white-space:nowrap;
    animation:
        typeUsername 1.15s steps(10,end) .35s forwards,
        typeCaret .72s step-end infinite;
    margin-top:15px;
}

.bio{
    margin-top:10px;
    color:#bdbdbd;
}

.socials{
    width:0;
    max-width:298px;
    margin-top:24px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
    overflow:hidden;
    border-right:3px solid rgba(255,255,255,.75);
    animation:
        typeSocials 1s steps(4,end) 1.6s forwards,
        typeCaret .72s step-end infinite;
}

.socials a{
    position:relative;
    width:46px;
    height:46px;
    display:grid;
    place-items:center;
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background:rgba(255,255,255,.055);
    color:rgba(255,255,255,.9);
    text-decoration:none;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 10px 30px rgba(0,0,0,.22);
    transition:transform .22s ease, background .22s ease, border-color .22s ease, color .22s ease;
}

.socials a:hover{
    transform:translateY(-3px) scale(1.04);
    background:rgba(255,255,255,.13);
    border-color:rgba(255,255,255,.25);
    color:white;
}

.socials a::after{
    content:attr(aria-label);
    position:absolute;
    bottom:-34px;
    left:50%;
    transform:translateX(-50%) translateY(-4px);
    padding:6px 9px;
    border-radius:8px;
    background:rgba(10,10,10,.9);
    border:1px solid rgba(255,255,255,.1);
    color:#dcdcdc;
    font-family:'Minecraft','Press Start 2P',monospace;
    font-size:.72rem;
    letter-spacing:0;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:.2s ease;
}

.socials a:hover::after{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

.socials i{
    font-size:1.35rem;
}

.stats{
    margin-top:20px;
    color:#8d8d8d;
    font-size:.9rem;
}

.glow{
    position:fixed;
    width:500px;
    height:500px;
    background:white;
    opacity:.04;
    filter:blur(150px);
    border-radius:50%;
    will-change:transform;
}

.g1{
    top:-150px;
    left:-100px;
    transform:translate3d(calc(var(--move-x, 0) * 45px), calc(var(--move-y, 0) * 35px), 0);
}

.g2{
    bottom:-150px;
    right:-100px;
    transform:translate3d(calc(var(--move-x, 0) * -55px), calc(var(--move-y, 0) * -45px), 0);
}

.diamond-cursor{
    position:fixed;
    left:0;
    top:0;
    width:18px;
    height:18px;
    z-index:999;
    pointer-events:none;
    transform:translate3d(-50px, -50px, 0) rotate(45deg);
    border:2px solid rgba(210,245,255,.95);
    background:linear-gradient(135deg, rgba(255,255,255,.95), rgba(109,213,255,.58));
    box-shadow:
        0 0 12px rgba(125,220,255,.85),
        0 0 28px rgba(255,255,255,.28);
    will-change:transform;
}

.diamond-cursor::after{
    content:"";
    position:absolute;
    inset:3px;
    border:1px solid rgba(255,255,255,.7);
}

.snowflake{
    position:fixed;
    left:0;
    top:0;
    z-index:998;
    pointer-events:none;
    color:rgba(235,250,255,.95);
    font-size:12px;
    text-shadow:0 0 10px rgba(145,225,255,.75);
    animation:fallSnow .9s linear forwards;
    will-change:transform, opacity;
}
/* ========= CINEMATIC INTRO ========= */

/* ...all the new CSS I gave you... */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes enterRipple{
    0%{
        opacity:0;
        transform:translate(-50%, -50%) scale(.28);
    }
    18%{
        opacity:.85;
    }
    100%{
        opacity:0;
        transform:translate(-50%, -50%) scale(4.2);
    }
}

@keyframes glassBreak{
    0%{
        opacity:1;
        transform:translate3d(0,0,0) rotate(0deg) scale(1);
    }
    72%{
        opacity:.8;
    }
    100%{
        opacity:0;
        transform:translate3d(var(--shard-x), var(--shard-y), 0) rotate(var(--shard-r)) scale(.9);
    }
}

@keyframes liveWallpaper{
    0%{
        transform:scale(1.12) translate3d(-3px, -2px, 0);
        filter:saturate(1.08) brightness(1.04);
    }
    50%{
        transform:scale(1.18) translate3d(4px, -6px, 0);
        filter:saturate(1.2) brightness(1.1);
    }
    100%{
        transform:scale(1.14) translate3d(-5px, 5px, 0);
        filter:saturate(1.12) brightness(1.06);
    }
}

@keyframes eyePulse{
    0%, 100%{
        opacity:.78;
        transform:rotate(-9deg) scale(.9);
    }
    45%{
        opacity:1;
        transform:rotate(-9deg) scale(1.12);
    }
    60%{
        opacity:.88;
        transform:rotate(-9deg) scale(.98);
    }
}

@keyframes typeUsername{
    to{
        width:10ch;
    }
}

@keyframes typeSocials{
    to{
        width:298px;
        border-right-color:transparent;
    }
}

@keyframes typeCaret{
    50%{
        border-right-color:transparent;
    }
}

@keyframes fallSnow{
    from{
        opacity:1;
        transform:translate3d(var(--snow-x), var(--snow-y), 0) rotate(0deg) scale(1);
    }
    to{
        opacity:0;
        transform:translate3d(calc(var(--snow-x) + var(--snow-drift)), calc(var(--snow-y) + 86px), 0) rotate(180deg) scale(.35);
    }
}
</style>
</head>
<body>

<div id="bg"></div>

<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="diamond-cursor" id="diamondCursor"></div>

<div id="enter">
    <div class="enter-center" style="position:fixed;inset:0;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;z-index:1002;pointer-events:none;">
        <button class="enter-btn" onclick="enterSite()">
            <span>ENTER</span>
        </button>
    </div>
</div>

<div class="main" id="main">

    <div class="card">

        <div class="avatar-wrap">
            <img class="avatar"
            src="gojo-satoru.jpg"
            alt="silent_k77 avatar">
            <span class="eye-glow"></span>
            <span class="glass-shard shard-1"></span>
            <span class="glass-shard shard-2"></span>
            <span class="glass-shard shard-3"></span>
            <span class="glass-shard shard-4"></span>
            <span class="glass-shard shard-5"></span>
            <span class="glass-shard shard-6"></span>
        </div>

        <div class="username">silent_k77</div>

        <div class="bio">
            gamer - creator - developer
        </div>

        <div class="socials">
            <a href="#" aria-label="Discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="#" aria-label="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="#" aria-label="TikTok">
                <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="#" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i>

        <div class="stats">
            welcome to my profile
        </div>

    </div>

</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
let musicPlayer;

function enterSite(){
    document.body.classList.add("entered");
    document.getElementById("enter").style.display="none";
    document.getElementById("main").style.display="flex";

    if(musicPlayer){
        musicPlayer.play();
    }
}

window.addEventListener("load", ()=>{
    musicPlayer=SC.Widget(document.getElementById("bgm"));

    musicPlayer.bind(SC.Widget.Events.FINISH, ()=>{
        musicPlayer.seekTo(0);
        musicPlayer.play();
    });
});

const cursor={
    x:0,
    y:0,
    targetX:0,
    targetY:0,
    screenX:window.innerWidth / 2,
    screenY:window.innerHeight / 2
};

window.addEventListener("mousemove", (event)=>{
    cursor.targetX=(event.clientX / window.innerWidth - .5) * 2;
    cursor.targetY=(event.clientY / window.innerHeight - .5) * 2;
    cursor.screenX=event.clientX;
    cursor.screenY=event.clientY;
});

window.addEventListener("touchmove", (event)=>{
    if(!event.touches.length) return;

    const touch=event.touches[0];
    cursor.targetX=(touch.clientX / window.innerWidth - .5) * 2;
    cursor.targetY=(touch.clientY / window.innerHeight - .5) * 2;
    cursor.screenX=touch.clientX;
    cursor.screenY=touch.clientY;
}, {passive:true});

function animateCursor(){
    cursor.x+=(cursor.targetX - cursor.x) * .08;
    cursor.y+=(cursor.targetY - cursor.y) * .08;

    document.documentElement.style.setProperty("--move-x", cursor.x.toFixed(3));
    document.documentElement.style.setProperty("--move-y", cursor.y.toFixed(3));
    document.getElementById("diamondCursor").style.transform=`translate3d(${cursor.screenX}px, ${cursor.screenY}px, 0) rotate(45deg)`;

    requestAnimationFrame(animateCursor);
}

animateCursor();

function dropSnowflake(){
    const snowflake=document.createElement("span");
    const size=8 + Math.random() * 10;
    const drift=(Math.random() - .5) * 70;

    snowflake.className="snowflake";
    snowflake.textContent="❄";
    snowflake.style.fontSize=`${size}px`;
    snowflake.style.setProperty("--snow-x", `${cursor.screenX - size / 2}px`);
    snowflake.style.setProperty("--snow-y", `${cursor.screenY + 14}px`);
    snowflake.style.setProperty("--snow-drift", `${drift}px`);

    document.body.appendChild(snowflake);
    snowflake.addEventListener("animationend", ()=>{
        snowflake.remove();
    });
}

setInterval(dropSnowflake, 85);
</script>
